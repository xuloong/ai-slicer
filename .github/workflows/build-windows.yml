name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow
      - name: Install npm deps
        run: npm install
      - name: Install ffmpeg tools
        shell: pwsh
        run: choco install ffmpeg -y --no-progress
      - name: Verify private config secrets
        shell: pwsh
        run: |
          if (-not $env:ARK_API_KEY) { throw "Missing ARK_API_KEY secret" }
          if (-not $env:APIMART_API_KEY) { throw "Missing APIMART_API_KEY secret" }
          if (-not $env:TOS_ACCESS_KEY_ID) { throw "Missing TOS_ACCESS_KEY_ID secret" }
          if (-not $env:TOS_SECRET_ACCESS_KEY) { throw "Missing TOS_SECRET_ACCESS_KEY secret" }
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
      - name: Build sidecar
        run: python scripts\\build_sidecar.py
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_PUBLIC_BASE_URL: ${{ secrets.TOS_PUBLIC_BASE_URL }}
          TOS_OBJECT_PREFIX: ${{ secrets.TOS_OBJECT_PREFIX }}
          TLS_ENDPOINT: ${{ secrets.TLS_ENDPOINT }}
          TLS_REGION: ${{ secrets.TLS_REGION }}
          TLS_PROJECT_NAME: ${{ secrets.TLS_PROJECT_NAME }}
          TLS_TOPIC_NAME: ${{ secrets.TLS_TOPIC_NAME }}
          TLS_ACCESS_KEY_ID: ${{ secrets.TLS_ACCESS_KEY_ID }}
          TLS_SECRET_ACCESS_KEY: ${{ secrets.TLS_SECRET_ACCESS_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          WHISPER_REPO_ID: ${{ secrets.WHISPER_REPO_ID }}
          BUNDLE_WHISPER_MODEL: ${{ secrets.BUNDLE_WHISPER_MODEL }}
      - name: Disable updater artifact signing for installer artifact
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw
          $config = $config -replace '"createUpdaterArtifacts": true', '"createUpdaterArtifacts": false'
          Set-Content src-tauri/tauri.conf.json $config
      - name: Build Tauri app
        run: npm run build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: highlight_client/src-tauri/target/release/bundle/nsis/*.exe
