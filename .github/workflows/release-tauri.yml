name: Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-macos:
    permissions:
      contents: write
    runs-on: macos-14
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Build sidecar
        run: python scripts/build_sidecar.py

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: highlight_client
          tagName: v__VERSION__
          releaseName: "AI短视频创作工具 v__VERSION__"
          releaseBody: "自动发布安装包和更新包。"
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target aarch64-apple-darwin --bundles dmg

  release-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Build sidecar
        run: python scripts/build_sidecar.py

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: highlight_client
          tagName: v__VERSION__
          releaseName: "AI短视频创作工具 v__VERSION__"
          releaseBody: "自动发布安装包和更新包。"
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles nsis
