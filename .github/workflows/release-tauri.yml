name: Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Build sidecar
        run: python scripts/build_sidecar.py
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_PUBLIC_BASE_URL: ${{ secrets.TOS_PUBLIC_BASE_URL }}
          TOS_OBJECT_PREFIX: ${{ secrets.TOS_OBJECT_PREFIX }}
          TLS_ENDPOINT: ${{ secrets.TLS_ENDPOINT }}
          TLS_REGION: ${{ secrets.TLS_REGION }}
          TLS_PROJECT_NAME: ${{ secrets.TLS_PROJECT_NAME }}
          TLS_TOPIC_NAME: ${{ secrets.TLS_TOPIC_NAME }}
          TLS_ACCESS_KEY_ID: ${{ secrets.TLS_ACCESS_KEY_ID }}
          TLS_SECRET_ACCESS_KEY: ${{ secrets.TLS_SECRET_ACCESS_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          WHISPER_REPO_ID: ${{ secrets.WHISPER_REPO_ID }}
          BUNDLE_WHISPER_MODEL: ${{ secrets.BUNDLE_WHISPER_MODEL }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: highlight_client
          tagName: ${{ github.ref_name }}
          releaseName: "AI短视频创作工具 ${{ github.ref_name }}"
          releaseBody: "自动发布安装包和更新包。"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target aarch64-apple-darwin --bundles dmg

  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Build sidecar
        run: python scripts/build_sidecar.py
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_PUBLIC_BASE_URL: ${{ secrets.TOS_PUBLIC_BASE_URL }}
          TOS_OBJECT_PREFIX: ${{ secrets.TOS_OBJECT_PREFIX }}
          TLS_ENDPOINT: ${{ secrets.TLS_ENDPOINT }}
          TLS_REGION: ${{ secrets.TLS_REGION }}
          TLS_PROJECT_NAME: ${{ secrets.TLS_PROJECT_NAME }}
          TLS_TOPIC_NAME: ${{ secrets.TLS_TOPIC_NAME }}
          TLS_ACCESS_KEY_ID: ${{ secrets.TLS_ACCESS_KEY_ID }}
          TLS_SECRET_ACCESS_KEY: ${{ secrets.TLS_SECRET_ACCESS_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          WHISPER_REPO_ID: ${{ secrets.WHISPER_REPO_ID }}
          BUNDLE_WHISPER_MODEL: ${{ secrets.BUNDLE_WHISPER_MODEL }}

      - name: Disable updater artifact signing for Windows installer
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw
          $config = $config -replace '"createUpdaterArtifacts": true', '"createUpdaterArtifacts": false'
          Set-Content src-tauri/tauri.conf.json $config

      - name: Build Tauri Windows installer
        run: npm run build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AI短视频创作工具 ${{ github.ref_name }}"
          body: "自动发布安装包和更新包。"
          draft: false
          prerelease: false
          files: highlight_client/src-tauri/target/release/bundle/nsis/*.exe
