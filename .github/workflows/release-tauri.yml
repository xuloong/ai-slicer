name: Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Install ffmpeg tools
        run: brew install ffmpeg

      - name: Verify updater signing secret
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret. Updater latest.json cannot be generated without it."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build sidecar
        run: python scripts/build_sidecar.py
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_PUBLIC_BASE_URL: ${{ secrets.TOS_PUBLIC_BASE_URL }}
          TOS_OBJECT_PREFIX: ${{ secrets.TOS_OBJECT_PREFIX }}
          TLS_ENDPOINT: ${{ secrets.TLS_ENDPOINT }}
          TLS_REGION: ${{ secrets.TLS_REGION }}
          TLS_PROJECT_NAME: ${{ secrets.TLS_PROJECT_NAME }}
          TLS_TOPIC_NAME: ${{ secrets.TLS_TOPIC_NAME }}
          TLS_ACCESS_KEY_ID: ${{ secrets.TLS_ACCESS_KEY_ID }}
          TLS_SECRET_ACCESS_KEY: ${{ secrets.TLS_SECRET_ACCESS_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          WHISPER_REPO_ID: ${{ secrets.WHISPER_REPO_ID }}
          BUNDLE_WHISPER_MODEL: ${{ secrets.BUNDLE_WHISPER_MODEL }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: highlight_client
          tagName: ${{ github.ref_name }}
          releaseName: "AI短视频创作工具 ${{ github.ref_name }}"
          releaseBody: "自动发布安装包和更新包。"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target aarch64-apple-darwin --bundles dmg

      - name: Normalize Mac DMG asset name
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const version = tag.replace(/^v/, "");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const desiredName = `AI短视频创作工具_${version}_aarch64.dmg`;
            let asset = null;
            for (let i = 0; i < 12; i++) {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              asset = release.data.assets.find((item) =>
                item.name.endsWith(`_${version}_aarch64.dmg`) && item.name !== desiredName
              );
              if (asset) break;
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }
            if (!asset) {
              core.info("No Mac DMG asset needs renaming.");
              return;
            }
            await github.rest.repos.updateReleaseAsset({
              owner,
              repo,
              asset_id: asset.id,
              name: desiredName,
            });
            core.info(`Renamed ${asset.name} to ${desiredName}`);

  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: highlight_client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python build deps
        run: python -m pip install -r requirements-build.txt pillow

      - name: Install npm deps
        run: npm install

      - name: Install ffmpeg tools
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Verify updater signing secret
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret. Updater latest.json cannot be generated without it."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build sidecar
        run: python scripts/build_sidecar.py
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_PUBLIC_BASE_URL: ${{ secrets.TOS_PUBLIC_BASE_URL }}
          TOS_OBJECT_PREFIX: ${{ secrets.TOS_OBJECT_PREFIX }}
          TLS_ENDPOINT: ${{ secrets.TLS_ENDPOINT }}
          TLS_REGION: ${{ secrets.TLS_REGION }}
          TLS_PROJECT_NAME: ${{ secrets.TLS_PROJECT_NAME }}
          TLS_TOPIC_NAME: ${{ secrets.TLS_TOPIC_NAME }}
          TLS_ACCESS_KEY_ID: ${{ secrets.TLS_ACCESS_KEY_ID }}
          TLS_SECRET_ACCESS_KEY: ${{ secrets.TLS_SECRET_ACCESS_KEY }}
          WHISPER_MODEL: ${{ secrets.WHISPER_MODEL }}
          WHISPER_REPO_ID: ${{ secrets.WHISPER_REPO_ID }}
          BUNDLE_WHISPER_MODEL: ${{ secrets.BUNDLE_WHISPER_MODEL }}

      - name: Build and publish Tauri Windows release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: highlight_client
          tagName: ${{ github.ref_name }}
          releaseName: "AI短视频创作工具 ${{ github.ref_name }}"
          releaseBody: "自动发布安装包和更新包。"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles nsis

      - name: Normalize Windows installer asset name
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const version = tag.replace(/^v/, "");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const desiredName = `AI短视频创作工具_${version}_x64-setup.exe`;
            let asset = null;
            for (let i = 0; i < 12; i++) {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              asset = release.data.assets.find((item) =>
                item.name.endsWith(`_${version}_x64-setup.exe`) && item.name !== desiredName
              );
              if (asset) break;
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }
            if (!asset) {
              core.info("No Windows installer asset needs renaming.");
              return;
            }
            await github.rest.repos.updateReleaseAsset({
              owner,
              repo,
              asset_id: asset.id,
              name: desiredName,
            });
            core.info(`Renamed ${asset.name} to ${desiredName}`);

  verify-updater-json:
    runs-on: ubuntu-latest
    needs:
      - release-macos
      - release-windows
    steps:
      - name: Verify latest.json exists and contains desktop platforms
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let latestAsset = null;
            for (let i = 0; i < 12; i++) {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              latestAsset = release.data.assets.find((item) => item.name === "latest.json");
              if (latestAsset) break;
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }
            if (!latestAsset) {
              core.setFailed("latest.json was not uploaded to the release.");
              return;
            }
            const response = await fetch(latestAsset.browser_download_url);
            if (!response.ok) {
              core.setFailed(`Could not fetch latest.json: HTTP ${response.status}`);
              return;
            }
            const latest = await response.json();
            const platforms = latest.platforms || {};
            const platformKeys = Object.keys(platforms);
            const hasMac = platformKeys.some((key) => key.includes("darwin"));
            const hasWindows = platformKeys.some((key) => key.includes("windows"));
            if (!latest.version || !hasMac || !hasWindows) {
              core.setFailed(`latest.json is incomplete. version=${latest.version || ""}, platforms=${platformKeys.join(",")}`);
              return;
            }
            core.info(`latest.json verified for ${latest.version}: ${platformKeys.join(", ")}`);
